
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Códigos de Erro</title>

<style>
body{
font-family:Arial, Helvetica, sans-serif;
background:#f3f6fb;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

h1{
text-align:center;
}

label{
display:block;
margin-top:10px;
font-weight:bold;
}

input,select{
width:100%;
padding:10px;
margin-top:5px;
border-radius:8px;
border:1px solid #ccc;
}

.result{
margin-top:20px;
padding:15px;
border-radius:10px;
background:#eaf2ff;
}

.codigo{
font-size:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h1>Códigos de erro</h1>

<label>Marca</label>
<select id="marca"></select>

<label>Linha</label>
<select id="linha">
<option value="Split">Split</option>
<option value="Piso teto">Piso teto</option>
</select>

<label>Código de erro</label>
<input id="codigo" placeholder="Ex: E1, CH05">

<div class="result" id="resultado">
Digite um código para buscar
</div>

</div>

<script>

let dados = []

async function carregar(){

const resp = await fetch("dados-erros-final-split-pisoteto.json")
dados = await resp.json()

let marcas = [...new Set(dados.map(d=>d.marca))]

let select = document.getElementById("marca")

marcas.sort().forEach(m=>{
let opt=document.createElement("option")
opt.value=m
opt.textContent=m
select.appendChild(opt)
})

}

function buscar(){

let marca = document.getElementById("marca").value
let linha = document.getElementById("linha").value
let codigo = document.getElementById("codigo").value.toUpperCase().trim()

let encontrados = dados.filter(d=>{

return (
d.marca===marca &&
d.linha_tipo===linha &&
(d.codigo_busca===codigo || d.codigo_lista?.includes(codigo))
)

})

mostrar(encontrados)

}

function mostrar(lista){

let div=document.getElementById("resultado")

if(lista.length===0){
div.innerHTML="Nenhum resultado encontrado"
return
}

div.innerHTML=""

lista.forEach(e=>{

div.innerHTML += `
<div style="margin-bottom:15px">
<div class="codigo">${e.codigo}</div>
<div><b>Marca:</b> ${e.marca}</div>
<div><b>Linha:</b> ${e.linha_tipo}</div>
<div><b>Significado:</b> ${e.significado}</div>
<div><b>Ação:</b> ${e.acao}</div>
</div>
`

})

}

document.getElementById("codigo").addEventListener("input",buscar)

carregar()

</script>

</body>
</html>
