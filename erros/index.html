<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Códigos de Erro</title>
<style>
body{
  font-family:Arial, Helvetica, sans-serif;
  background:#f3f6fb;
  margin:0;
  padding:20px;
}
.container{
  max-width:860px;
  margin:auto;
  background:#fff;
  padding:20px;
  border-radius:14px;
  box-shadow:0 5px 20px rgba(0,0,0,.1);
}
h1{
  text-align:center;
  margin-top:0;
}
label{
  display:block;
  margin-top:12px;
  font-weight:bold;
}
input, select{
  width:100%;
  padding:11px;
  margin-top:5px;
  border-radius:8px;
  border:1px solid #ccc;
  box-sizing:border-box;
}
.grid{
  display:grid;
  grid-template-columns:1.2fr 1fr 1fr;
  gap:12px;
}
@media (max-width:700px){
  .grid{grid-template-columns:1fr;}
}
.topo{
  font-size:13px;
  color:#666;
  margin-top:8px;
}
.result{
  margin-top:18px;
}
.card{
  background:#eaf2ff;
  border-radius:10px;
  padding:14px;
  margin-bottom:12px;
}
.codigo{
  font-size:22px;
  font-weight:bold;
  margin-bottom:8px;
}
.badges{
  margin-bottom:8px;
}
.badge{
  display:inline-block;
  background:#fff;
  border:1px solid #d8e5ff;
  border-radius:999px;
  padding:4px 8px;
  font-size:12px;
  margin-right:6px;
  margin-bottom:6px;
}
.bloco{
  margin-top:10px;
}
.bloco b{
  display:block;
  margin-bottom:4px;
}
.lista{
  margin:0;
  padding-left:18px;
}
.lista li{
  margin-bottom:4px;
}
.muted{color:#666}
</style>
</head>
<body>
<div class="container">
  <h1>Códigos de erro</h1>

  <div class="grid">
    <div>
      <label>Buscar por código ou texto</label>
      <input id="busca" placeholder="Ex: E1, CH05, P0, sensor, comunicação">
    </div>
    <div>
      <label>Marca</label>
      <select id="marca">
        <option value="">Todas as marcas</option>
      </select>
    </div>
    <div>
      <label>Linha</label>
      <select id="linha">
        <option value="">Todas</option>
        <option value="Split">Split</option>
        <option value="Piso teto">Piso teto</option>
      </select>
    </div>
  </div>

  <div class="topo" id="status">Carregando base...</div>
  <div class="result" id="resultado"></div>
</div>

<script>
let dados = [];

function norm(v){
  return String(v || "")
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .toUpperCase()
    .trim();
}

function listaHtml(titulo, arr){
  if(!Array.isArray(arr) || !arr.length) return "";
  return `
    <div class="bloco">
      <b>${titulo}</b>
      <ul class="lista">
        ${arr.map(item => `<li>${item}</li>`).join("")}
      </ul>
    </div>
  `;
}

function montarTextoBusca(item){
  const partes = [
    item.codigo,
    item.codigo_busca,
    item.marca,
    item.linha,
    item.linha_modelo,
    item.linha_tipo,
    item.significado,
    item.dica,
    item.texto_busca,
    ...(Array.isArray(item.codigo_lista) ? item.codigo_lista : []),
    ...(Array.isArray(item.causas) ? item.causas : []),
    ...(Array.isArray(item.diagnostico) ? item.diagnostico : []),
    ...(Array.isArray(item.teste_rapido) ? item.teste_rapido : [])
  ];
  return norm(partes.filter(Boolean).join(" "));
}

async function carregar(){
  const resp = await fetch("dados-erros-final-split-pisoteto.json");
  dados = await resp.json();

  const marcas = [...new Set(dados.map(d => d.marca).filter(Boolean))].sort((a,b)=>a.localeCompare(b,'pt-BR'));
  const sel = document.getElementById("marca");

  marcas.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m;
    opt.textContent = m;
    sel.appendChild(opt);
  });

  document.getElementById("status").textContent = `${dados.length} registros carregados`;
  buscar();
}

function score(item, termo){
  if(!termo) return 1;

  const t = norm(termo);
  const codigo = norm(item.codigo || "");
  const lista = Array.isArray(item.codigo_lista) ? item.codigo_lista.map(norm) : [];
  const texto = montarTextoBusca(item);

  if(codigo === t) return 100;
  if(lista.includes(t)) return 95;
  if(codigo.includes(t)) return 80;
  if(texto.includes(t)) return 40;
  return 0;
}

function buscar(){
  const termo = document.getElementById("busca").value.trim();
  const marca = document.getElementById("marca").value;
  const linha = document.getElementById("linha").value;

  let lista = dados
    .map(item => ({...item, _score: score(item, termo)}))
    .filter(item => {
      if(marca && item.marca !== marca) return false;
      if(linha && item.linha_tipo !== linha) return false;
      if(termo && item._score === 0) return false;
      return true;
    })
    .sort((a,b) => {
      if(b._score !== a._score) return b._score - a._score;
      if((a.marca || "") !== (b.marca || "")) return (a.marca || "").localeCompare(b.marca || "", "pt-BR");
      if((a.linha_tipo || "") !== (b.linha_tipo || "")) return (a.linha_tipo || "").localeCompare(b.linha_tipo || "", "pt-BR");
      return (a.codigo || "").localeCompare(b.codigo || "", "pt-BR");
    });

  if(!termo && !marca && !linha){
    lista = [];
  }

  mostrar(lista, termo, marca, linha);
}

function mostrar(lista, termo, marca, linha){
  const div = document.getElementById("resultado");
  const status = document.getElementById("status");

  if(!termo && !marca && !linha){
    status.textContent = "Digite um código para ver todas as marcas e depois filtre por marca ou linha.";
    div.innerHTML = '<div class="card muted">Exemplo: digite <b>E1</b> para listar todos os E1 de todas as marcas.</div>';
    return;
  }

  status.textContent = `${lista.length} resultado(s) encontrado(s)`;

  if(!lista.length){
    div.innerHTML = '<div class="card muted">Nenhum resultado encontrado.</div>';
    return;
  }

  div.innerHTML = "";

  lista.slice(0, 80).forEach(e => {
    const modelo = e.linha_modelo ? `<div><b>Modelo:</b> ${e.linha_modelo}</div>` : "";
    const relacionados = Array.isArray(e.codigo_lista) && e.codigo_lista.length
      ? `<div><b>Códigos relacionados:</b> ${e.codigo_lista.join(", ")}</div>`
      : "";
    const dica = e.dica ? `<div class="bloco"><b>Dica</b><div>${e.dica}</div></div>` : "";

    div.innerHTML += `
      <div class="card">
        <div class="codigo">${e.codigo || "-"}</div>
        <div class="badges">
          <span class="badge">${e.marca || "-"}</span>
          <span class="badge">${e.linha_tipo || "-"}</span>
        </div>
        <div><b>Significado:</b> ${e.significado || "-"}</div>
        ${modelo}
        ${relacionados}
        ${listaHtml("Possíveis causas", e.causas)}
        ${listaHtml("Diagnóstico", e.diagnostico)}
        ${listaHtml("Teste rápido", e.teste_rapido)}
        ${dica}
      </div>
    `;
  });

  if(lista.length > 80){
    div.innerHTML += `<div class="card muted">Mostrando 80 resultados de ${lista.length}.</div>`;
  }
}

document.getElementById("busca").addEventListener("input", buscar);
document.getElementById("marca").addEventListener("change", buscar);
document.getElementById("linha").addEventListener("change", buscar);

carregar();
</script>
</body>
</html>
