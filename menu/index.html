<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Climatização - Menu</title>
  <meta name="theme-color" content="#0f172a">
  <style>
    :root{
      --bg1:#0f172a;
      --bg2:#1e3a8a;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:#e2e8f0;
      --brand:#2563eb;
      --brand-2:#38bdf8;
      --soft:#eff6ff;
      --shadow:0 20px 50px rgba(2,6,23,.22);
      --radius:24px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial;
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(56,189,248,.28), transparent 28%),
        radial-gradient(circle at top left, rgba(37,99,235,.30), transparent 24%),
        linear-gradient(160deg, var(--bg1) 0%, #172554 35%, var(--bg2) 100%);
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:22px 16px 34px;
    }
    .hero{
      position:relative;
      overflow:hidden;
      border-radius:30px;
      background:linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.16);
      box-shadow:var(--shadow);
      padding:24px;
      backdrop-filter:blur(10px);
      color:#fff;
    }
    .hero:before{
      content:"";
      position:absolute;
      inset:auto -40px -40px auto;
      width:180px;
      height:180px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(56,189,248,.35), transparent 68%);
      pointer-events:none;
    }
    .top-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:8px 12px;
      font-size:12px;
      font-weight:800;
      letter-spacing:.02em;
      background:rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
    }
    .hero-grid{
      display:grid;
      grid-template-columns:130px 1fr;
      gap:18px;
      align-items:center;
      margin-top:16px;
    }
    .logo-box{
      width:130px;
      height:130px;
      border-radius:28px;
      background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);
      display:grid;
      place-items:center;
      overflow:hidden;
      backdrop-filter:blur(8px);
    }
    .logo{
      max-width:100px;
      max-height:100px;
      object-fit:contain;
      display:none;
    }
    .logo-fallback{
      font-size:42px;
      opacity:.95;
    }
    .hero h1{
      margin:0;
      font-size:34px;
      line-height:1.05;
      font-weight:1000;
    }
    .hero p{
      margin:10px 0 0;
      max-width:560px;
      color:rgba(255,255,255,.88);
      line-height:1.45;
      font-size:15px;
    }
    .cards{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:16px;
      margin-top:18px;
    }
    .card{
      position:relative;
      border:none;
      text-align:left;
      border-radius:26px;
      background:var(--card);
      padding:18px;
      cursor:pointer;
      box-shadow:var(--shadow);
      transition:transform .15s ease, box-shadow .15s ease;
      min-height:210px;
    }
    .card:hover{
      transform:translateY(-2px);
      box-shadow:0 24px 60px rgba(2,6,23,.28);
    }
    .card.primary{
      background:linear-gradient(180deg, #2563eb 0%, #1d4ed8 100%);
      color:#fff;
    }
    .icon{
      width:56px;
      height:56px;
      border-radius:18px;
      display:grid;
      place-items:center;
      font-size:28px;
      background:var(--soft);
      margin-bottom:18px;
    }
    .primary .icon{
      background:rgba(255,255,255,.16);
    }
    .title{
      font-size:22px;
      font-weight:1000;
      line-height:1.1;
      margin:0 0 8px;
    }
    .desc{
      font-size:14px;
      line-height:1.45;
      color:var(--muted);
      margin:0;
    }
    .primary .desc{
      color:rgba(255,255,255,.9);
    }
    .tag{
      position:absolute;
      right:14px;
      top:14px;
      font-size:11px;
      font-weight:900;
      border-radius:999px;
      padding:6px 8px;
      background:#dbeafe;
      color:#1d4ed8;
    }
    .primary .tag{
      background:rgba(255,255,255,.16);
      color:#fff;
    }
    .foot{
      margin-top:14px;
      text-align:center;
      color:rgba(255,255,255,.82);
      font-size:12px;
    }
    @media (max-width:860px){
      .cards{grid-template-columns:1fr}
      .hero-grid{grid-template-columns:1fr; text-align:center}
      .logo-box{margin:0 auto}
      .hero p{margin-left:auto;margin-right:auto}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="top-pill" id="destinoPill">Carregando entrada...</div>

      <div class="hero-grid">
        <div class="logo-box">
          <img id="logo" class="logo" alt="Logo do técnico">
          <div id="logoFallback" class="logo-fallback">❄️</div>
        </div>

        <div>
          <h1 id="nomeTecnico">Carregando técnico...</h1>
          <p>
            Escolha a ferramenta que deseja abrir. O orçamento continua no motor certo do cliente,
            e as demais páginas ficam centralizadas no app.
          </p>
        </div>
      </div>
    </section>

    <section class="cards">
      <button class="card primary" id="btnOrcamento" type="button">
        <div class="tag">PDF</div>
        <div class="icon">📄</div>
        <div class="title">Orçamento em PDF</div>
        <p class="desc">Abre o motor já definido pelo link do cliente, sem mudar sua arquitetura atual.</p>
      </button>

      <button class="card" id="btnErros" type="button">
        <div class="tag">ERROS</div>
        <div class="icon">🛠️</div>
        <div class="title">Códigos de erro</div>
        <p class="desc">Busca híbrida por código, com filtros por marca e linha para localizar o diagnóstico.</p>
      </button>

      <button class="card" id="btnCarga" type="button">
        <div class="tag">BTU</div>
        <div class="icon">🌡️</div>
        <div class="title">Carga térmica</div>
        <p class="desc">Calcula a capacidade ideal em BTU para o ambiente com base nos principais fatores.</p>
      </button>
    </section>

    <div class="foot">Menu único para todos os clientes.</div>
  </div>

<script>
(function(){
  const qs = new URLSearchParams(location.search);
  const cliente = qs.get('cliente') || qs.get('c') || 'robsonextecoetter';
  const destino = (qs.get('destino') || 'android').toLowerCase();

  const nomeEl = document.getElementById('nomeTecnico');
  const logoEl = document.getElementById('logo');
  const logoFallback = document.getElementById('logoFallback');
  const pillEl = document.getElementById('destinoPill');

  pillEl.textContent = destino === 'ios' ? '📱 Entrada iPhone / iOS' : '🤖 Entrada Android';

  function carregarConfigCliente(){
    return new Promise(function(resolve){
      const s = document.createElement('script');
      s.src = '../clientes/' + encodeURIComponent(cliente) + '/config.js?v=' + Date.now();
      s.onload = function(){ resolve(window.CLIENT_CONFIG || null); };
      s.onerror = function(){ resolve(null); };
      document.head.appendChild(s);
    });
  }

  function preencherCliente(cfg){
    const inst = (cfg && cfg.installer) || {};
    nomeEl.textContent = inst.nome || cliente;
    if(cfg && cfg.logo){
      logoEl.src = cfg.logo;
      logoEl.style.display = 'block';
      logoFallback.style.display = 'none';
      logoEl.onerror = function(){
        this.style.display = 'none';
        logoFallback.style.display = 'block';
      };
    }
  }

  document.getElementById('btnOrcamento').addEventListener('click', function(){
    const alvo = destino === 'ios' ? '../ios/index.html' : '../android/index.html';
    location.href = alvo + '?cliente=' + encodeURIComponent(cliente);
  });

  document.getElementById('btnErros').addEventListener('click', function(){
    location.href = '../erros/index.html?cliente=' + encodeURIComponent(cliente) + '&destino=' + encodeURIComponent(destino);
  });

  document.getElementById('btnCarga').addEventListener('click', function(){
    location.href = '../carga/index.html?cliente=' + encodeURIComponent(cliente) + '&destino=' + encodeURIComponent(destino);
  });

  carregarConfigCliente().then(preencherCliente);
})();
</script>
</body>
</html>
